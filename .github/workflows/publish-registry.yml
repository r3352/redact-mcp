name: Publish to MCP Registry

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from release tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip leading 'v' if present (v2.0.0 -> 2.0.0)
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Get GitHub OIDC token
        id: oidc
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://registry.modelcontextprotocol.io" \
            | jq -r '.value')
          echo "::add-mask::${OIDC_TOKEN}"
          echo "oidc_token=${OIDC_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Exchange for registry token
        id: registry
        run: |
          RESPONSE=$(curl -s -X POST https://registry.modelcontextprotocol.io/v0/auth/github-oidc \
            -H "Content-Type: application/json" \
            -d "{\"oidc_token\": \"${{ steps.oidc.outputs.oidc_token }}\"}")

          TOKEN=$(echo "$RESPONSE" | jq -r '.registry_token')
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "::error::Failed to get registry token: $RESPONSE"
            exit 1
          fi

          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Update server.json version and publish
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update version in server.json and the package entry
          PAYLOAD=$(jq \
            --arg v "$VERSION" \
            '.version = $v | .packages[0].version = $v' \
            server.json)

          echo "Publishing version ${VERSION} to MCP Registry..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://registry.modelcontextprotocol.io/v0/publish \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ steps.registry.outputs.token }}" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Successfully published to MCP Registry"
            echo "$BODY" | jq .
          else
            echo "::error::Publish failed (HTTP ${HTTP_CODE}): ${BODY}"
            exit 1
          fi
